<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./logo/DNS_Logo-com fundo.ico">
    <script src="./script.js"></script>
    <script src="./js/sessao.js"></script>

</head>

<body>
    <div class="pagina">
        <div class="cabecalho">
            <a href="./index.html"><img src="./logo/DNS_Logo-full-branco.png" class="icone"></a>
            <div>
                <a href="./login.html">Login</a> | <a href="./cadastro.html" class="atual">Cadastro</a>
            </div>
        </div>
        <div class="fundo-login-cadastro">
            <div class="pergaminho-cadastro">
                <span class="texto">Nome:</span>
                <input type="text" id="ipt_nome" class="escrita" maxlength="100">
                <span class="texto">Email:</span>
                <input type="text" id="ipt_email" class="escrita" maxlength="100">
                <span class="texto">Senha:</span>
                <input type="password" id="ipt_senha" class="escrita" minlength="6">
                <span class="texto">Confirar Senha:</span>
                <input type="password" id="ipt_confSenha" class="escrita">
                <button class="botao" onclick="validar(ipt_nome.value, ipt_email.value, ipt_senha.value, ipt_confSenha.value)">Entrar para a Guilda dos Jogadores</button>
            </div>
        </div>
    </div>
</body>

</html>
<script>
    let nome = ipt_nome.value
    let email = ipt_email.value
    let senha = ipt_senha.value
    let confSenha = ipt_confSenha.value
    let erros = 0
    let alerta = `Você está prestes à assinar o formulário de admissão da Guilda, mas a atendente para sua mão antes que a caneta toque o papel.

Ela diz:
"Calma aí aventureiro, `

function cadastrar() {
    // aguardar();

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nome,
        emailServer: email,
        senhaServer: senha,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }
</script>
