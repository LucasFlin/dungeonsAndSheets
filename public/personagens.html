<!DOCTYPE html>

<body>

    <div class="pers-geral">

                            <option value="druida">Druida</option>
                            <option value="feiticeiro">Feiticeiro</option>
                            <option value="paladino">Paladino</option>
                            <option value="clerigo">Clérigo</option>
                            <option value="barbaro">Barbaro</option>
                            <option value="bardo">Bardo</option>
                            <option value="monge">Monge</option>
                            <option value="patrulheiro">Patrulheiro</option>
                        </select>
                    </div>
                </div>
                <div>
                    <div class="ficha-stats">

                        </div>
                        <div>

                            <div id="div_con">0</div>
                        </div>
                        <div>
                            <input type="number" id="ipt_int">
                            <div id="div_int">0</div>
                        </div>
                        <div>
                            <input type="number" id="ipt_sab">
                            <div id="div_sab">0</div>
                        </div>
                        <div>
                            <input type="number" id="ipt_car">
                            <div id="div_car">0</div>
                        </div>
                    </div>
                    <div>
                        <div><input type="checkbox" id="chk_acrobacia"><label for="chk_acrobacia">Acrobacia

                        <div><input type="checkbox" id="chk_arcanismo"><label for="chk_arcanismo">Arcanismo

                        <div><input type="checkbox" id="chk_atuacao"><label for="chk_atuacao">Atuação

                        <div><input type="checkbox" id="chk_intimidacao"><label for="chk_intimidacao">Intimidação
                                <span>(Car)</span></label></div>
                        <div><input type="checkbox" id="chk_intuicao"><label for="chk_intuicao">Intuição
                                <span>(Sab)</span></label></div>
                        <div><input type="checkbox" id="chk_investigacao"><label for="chk_investigacao">Investigação
                                <span>(Int)</span></label></div>
                        <div><input type="checkbox" id="chk_lidar"><label for="chk_lidar">Lidar com Animais

                        <div><input type="checkbox" id="chk_natureza"><label for="chk_natureza">Natureza

                        <div><input type="checkbox" id="chk_percepcao"><label for="chk_percepcao">Percepção
                                <span>(Sab)</span></label></div>
                        <div><input type="checkbox" id="chk_persuasao"><label for="chk_persuasao">Persuasão
                                <span>(Car)</span></label></div>
                        <div><input type="checkbox" id="chk_prestidigitacao"><label

            <div class="linha">

                </div>

                </div>
            </div>
            <dialog id="dialogo_resultado" popover="auto" onclick="fechar()">
                    <div id="div_dado"></div>
                    <div id="div_bonus"></div>
                </dialog>
            <div class="pericias">

                <div><button id="roll_atletismo" class="dadinho" onclick="rollPericia(atletismo)"></button><label

                <div><button id="roll_atuacao" class="dadinho" onclick="rollPericia(atuacao)"></button><label

                        <span>(Car)</span></label></div>

                <div><button id="roll_historia" class="dadinho" onclick="rollPericia(historia)"></button><label
                        for="roll_historia">Historia
                        <span>(Int)</span></label></div>
                <div><button id="roll_intimidacao" class="dadinho" onclick="rollPericia(intimidacao)"></button><label

                <div><button id="roll_lidar" class="dadinho" onclick="rollPericia(lidar_animais)"></button><label
                        for="roll_lidar">Lidar com Animais
                        <span>(Sab)</span></label></div>
                <div><button id="roll_medicina" class="dadinho" onclick="rollPericia(medicina)"></button><label
                        for="roll_medicina">Medicina
                        <span>(Sab)</span></label></div>
                <div><button id="roll_natureza" class="dadinho" onclick="rollPericia(natureza)"></button><label

                        <span>(Int)</span></label></div>
                <div><button id="roll_percepcao" class="dadinho" onclick="rollPericia(percepcao)"></button><label

                        <span>(Sab)</span></label></div>
                <div><button id="roll_persuasao" class="dadinho" onclick="rollPericia(persuasao)"></button><label
                        for="roll_persuasao">Persuasão
                        <span>(Car)</span></label></div>
                <div><button id="roll_prestidigitacao" class="dadinho"
                        onclick="rollPericia(prestidigitacao)"></button><label
                        for="roll_prestidigitacao">Prestidigitação
                        <span>(Des)</span></label></div>
                <div><button id="roll_religiao" class="dadinho" onclick="rollPericia(religiao)"></button><label

            </div>
        </div>
        <div>

        </div>
    </div>
</body>

</html>
<script>

    window.onload = atualizarPersonagens()

    console.log(sessionStorage.ID_USUARIO)

    let idPersonagemAtual = 0

    let hpTPersonagem = 0
    let hpAPersonagem = 0

    let forcaPersonagem = 0
    let bonusFor = 0
    let destrezaPersonagem = 0
    let bonusDes = 0
    let constituicaoPersonagem = 0
    let bonusCons = 0
    let inteligenciaPersonagem = 0
    let bonusInt = 0
    let sabedoriaPersonagem = 0
    let bonusSab = 0
    let carismaPersonagem = 0
    let bonusCar = 0

    let acrobaciaPersonagem = false
    let arcanismoPersonagem = false
    let atletismoPersonagem = false
    let atuacaoPersonagem = false
    let enganacaoPersonagem = false
    let furtividadePersonagem = false
    let historiaPersonagem = false
    let intimidacaoPersonagem = false
    let intuicaoPersonagem = false
    let investicacaoPersonagem = false
    let lidarPersonagem = false
    let medicinaPersonagem = false
    let naturezaPersonagem = false
    let percepcaoPersonagem = false
    let persuasaoPersonagem = false
    let prestidigitacaoPersonagem = false
    let religiaoPersonagem = false
    let sobrevivenciaPersonagem = false

    function exibirPersonagensPorPlayer(antigo) {
        var personagens = JSON.parse(sessionStorage.PERSONAGENS);
        let pula = false
        slct_personagem.innerHTML = `<option value=""></option>
                    <option value="novo">Novo personagem...</option>`
        personagens.forEach(item => {
            if (item.nome != '') {
                document.getElementById("slct_personagem").innerHTML += `<option id='${item.id_personagem}'>${item.nome}</option>`
                // obterDadosGrafico(item.id)
            }
        });

        slct_personagem.value = antigo
    }

    function trocaPersonagem() {
        let valor = slct_personagem.value
        let idPersonagemAtual = valor
        var personagens = JSON.parse(sessionStorage.PERSONAGENS);
        console.log(slct_personagem.value)
        console.log(personagens)
        if (valor == 'novo') {
            criar_ficha.open = true
        } else {
            personagens.forEach(json => {
                if (json.nome == slct_personagem.value) {
                    let forcaPersonagem = 0
                    console.log(json.nome, slct_personagem.value)
                    hpTPersonagem = Number(json.hp_total)
                    hpAPersonagem = Number(json.hp_atual)

                    forcaPersonagem = Number(json.forc)
                    bonusFor = bonus(forcaPersonagem)
                    destrezaPersonagem = Number(json.des)
                    bonusDes = bonus(destrezaPersonagem)
                    constituicaoPersonagem = Number(json.cons)
                    bonusCons = bonus(constituicaoPersonagem)
                    inteligenciaPersonagem = Number(json.intel)
                    bonusInt = bonus(inteligenciaPersonagem)
                    sabedoriaPersonagem = Number(json.sab)
                    bonusSab = bonus(sabedoriaPersonagem)
                    carismaPersonagem = Number(json.car)
                    bonusCar = bonus(carismaPersonagem)

                    acrobaciaPersonagem = fromTinyInt(json.acrobacia)
                    arcanismoPersonagem = fromTinyInt(json.arcanismo)
                    atletismoPersonagem = fromTinyInt(json.atletismo)
                    atuacaoPersonagem = fromTinyInt(json.atuacao)
                    enganacaoPersonagem = fromTinyInt(json.blefar)
                    furtividadePersonagem = fromTinyInt(json.furtividade)
                    historiaPersonagem = fromTinyInt(json.historia)
                    intimidacaoPersonagem = fromTinyInt(json.intimidacao)
                    intuicaoPersonagem = fromTinyInt(json.intuicao)
                    investicacaoPersonagem = fromTinyInt(json.investigacao)
                    lidarPersonagem = fromTinyInt(json.lidar_animais)
                    medicinaPersonagem = fromTinyInt(json.medicina)
                    naturezaPersonagem = fromTinyInt(json.natureza)
                    percepcaoPersonagem = fromTinyInt(json.percepcao)
                    persuasaoPersonagem = fromTinyInt(json.persuasao)
                    prestidigitacaoPersonagem = fromTinyInt(json.prestidigitacao)
                    religiaoPersonagem = fromTinyInt(json.religiao)
                    sobrevivenciaPersonagem = fromTinyInt(json.sobrevivencia)

                    barra_hp.value = hpAPersonagem
                    barra_hp.max = hpTPersonagem
                    roll_forca.innerHTML = bonusFor
                    roll_des.innerHTML = bonusDes
                    roll_cons.innerHTML = bonusCons
                    roll_int.innerHTML = bonusInt
                    roll_sab.innerHTML = bonusSab
                    roll_car.innerHTML = bonusCar
                    numero_hp.innerHTML = `${hpAPersonagem}/${hpTPersonagem}`
                }
            })
        }
        atualizarPersonagens()
    }
    function criarPersonagem() {
        let nome = ipt_nome.value
        let raca = ipt_raca.value
        let classe = ipt_classe.value

        let forc = Number(ipt_for.value)
        let bonusFor = bonus(forc)
        let des = Number(ipt_dex.value)
        let bonusDes = bonus(des)
        let cons = Number(ipt_const.value)
        let bonusCon = bonus(cons)
        let intel = Number(ipt_int.value)
        let bonusInt = bonus(intel)
        let sab = Number(ipt_sab.value)
        let bonusSab = bonus(sab)
        let car = Number(ipt_car.value)
        let bonusCar = bonus(car)

        let acrobacia = toTinyInt(chk_acrobacia)
        let arcanismo = toTinyInt(chk_arcanismo)
        let atletismo = toTinyInt(chk_atletismo)
        let atuacao = toTinyInt(chk_atuacao)
        let blefar = toTinyInt(chk_enganacao)
        let furtividade = toTinyInt(chk_furtividade)
        let historia = toTinyInt(chk_historia)
        let intimidacao = toTinyInt(chk_intimidacao)
        let intuicao = toTinyInt(chk_intuicao)
        let investicacao = toTinyInt(chk_investigacao)
        let lidar_animais = toTinyInt(chk_lidar)
        let medicina = toTinyInt(chk_medicina)
        let natureza = toTinyInt(chk_natureza)
        let percepcao = toTinyInt(chk_percepcao)
        let persuasao = toTinyInt(chk_persuasao)
        let prestidigitacao = toTinyInt(chk_prestidigitacao)
        let religiao = toTinyInt(chk_religiao)
        let sobrevivencia = toTinyInt(chk_sobrevivencia)

        let hp_total = 0
        let bonusHp = Math.floor(cons / 2) - 5
        let hp_atual = 0

        console.log(bonusHp)

        if (classe == 'barbaro') {
            hp_total = 12 + bonusHp
            hp_total = Number(hp_total)
            hp_atual = Number(hp_total)

        } else if (classe == 'patrulheiro' || classe == 'paladino' || classe == 'guerreiro') {
            hp_total = 10 + bonusHp
            hp_total = Number(hp_total)
            hp_atual = Number(hp_total)
        } else if (classe == 'mago' || classe == 'feiticeiro') {
            hp_total = 6 + bonusHp
            hp_total = Number(hp_total)
            hp_atual = Number(hp_total)
        } else {
            hp_total = 8 + bonusHp
            hp_total = Number(hp_total)
            hp_atual = Number(hp_total)
        }
        // let placeholder = {
        //     "acrobacia": acrobacia,
        //     "arcanismo": arcanismo,
        //     "atletismo": atletismo,
        //     "atuacao": atuacao,
        //     "blefar": blefar,
        //     "car": car,
        //     "classe": classe,
        //     "cons": cons,
        //     "criado_em": "2000-01-01T02:00:00.000Z",
        //     "des": des,
        //     "fk_personagem": 200,
        //     "fk_player": sessionStorage.ID_USUARIO,
        //     "forc": forc,
        //     "furtividade": furtividade,
        //     "historia": historia,
        //     "hp_atual": hp_atual,
        //     "hp_total": hp_total,
        //     "id_personagem": 200,
        //     "intel": intel,
        //     "intimidacao": intimidacao,
        //     "intuicao": intuicao,
        //     "investigacao": investicacao,
        //     "lidar_animais": lidar_animais,
        //     "medicina": medicina,
        //     "modificado_em": "2000-01-01T02:00:00.000Z",
        //     "natureza": natureza,
        //     "nome": nome,
        //     "percepcao": percepcao,
        //     "persuasao": persuasao,
        //     "prestidigitacao": prestidigitacao,
        //     "raca": raca,
        //     "religiao": religiao,
        //     "sab": sab,
        //     "sobrevivencia": sobrevivencia
        // }

        // sessionStorage.PERSONAGENS[sessionStorage.PERSONAGENS.length] += placeholder

        let idPersonagem = cadastrar(sessionStorage.ID_USUARIO, nome, raca, classe, forc, des, cons, intel, sab, car, acrobacia, lidar_animais, arcanismo, atletismo, atuacao, blefar, furtividade, historia, intimidacao, intuicao, investicacao, medicina, natureza, percepcao, persuasao, prestidigitacao, religiao, sobrevivencia, hp_total, hp_atual)

        console.log(sessionStorage.ID_USUARIO, nome, raca, classe, forc, des, cons, intel, sab, car, acrobacia, lidar_animais, arcanismo, atletismo, atuacao, blefar, furtividade, historia, intimidacao, intuicao, investicacao, medicina, natureza, percepcao, persuasao, prestidigitacao, religiao, sobrevivencia, sobrevivencia, hp_atual)

        console.log(`Id do personagem criado: ${idPersonagem}`)
        slct_personagem.innerHTML += `<option id='${idPersonagem}'>${nome}</option>`
        criar_ficha.open = false
    }

    function toTinyInt(pericia) {
        if (pericia.checked == true) {
            return 1
        } else {
            return 0
        }
    }

    function fromTinyInt(pericia) {
        if (pericia == 1) {
            return true
        } else {
            return false
        }
    }

    function cadastrar(t1, t2, t3, t4, t5, t6, t7, t8, t9, t10, t11, t12, t13, t14, t15, t16, t17, t18, t19, t20, t21, t22, t23, t24, t25, t26, t27, t28, t29, t30) {
        // aguardar();

        // Enviando o valor da nova input
        fetch("/personagem/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                // crie um atributo que recebe o valor recuperado aqui
                // Agora vá para o arquivo routes/usuario.js
                idServer: t1,
                nomeServer: t2,
                racaServer: t3,
                classeServer: t4,
                forcaServer: t5,
                destrezaServer: t6,
                constituicaoServer: t7,
                inteligenciaServer: t8,
                sabedoriaServer: t9,
                carismaServer: t10,
                acrobaciaServer: t11,
                lidarServer: t12,
                arcanismoServer: t13,
                atletismoServer: t14,
                atuacaoServer: t15,
                enganacaoServer: t16,
                furtividadeServer: t17,
                historiaServer: t18,
                intimidacaoServer: t19,
                intuicaoServer: t20,
                investigacaoServer: t21,
                medicinaServer: t22,
                naturezaServer: t23,
                percepcaoServer: t24,
                persuasaoServer: t25,
                prestidigitacaoServer: t26,
                religiaoServer: t27,
                sobrevivenciaServer: t28,
                hp_totalServer: t29,
                hp_atualServer: t30,
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    console.log('Personagem cadastrado!')
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
        atualizarPersonagens()
    }

    function bonus(atributo) {
        let bonus = Math.floor(atributo / 2) - 5

        if (bonus > 0) {
            return `+${bonus}`
        } else {
            return bonus
        }
    }

    function vida(operacao) {
        hpAPersonagem = hpAPersonagem + operacao
        if (hpAPersonagem > hpTPersonagem) {
            hpAPersonagem -= 1
        } else {
            barra_hp.value = hpAPersonagem
            numero_hp.innerHTML = `${hpAPersonagem}/${hpTPersonagem}`
            atualizarVida()
        }
    }

    function atualizarVida() {
        let id = sessionStorage.ID_USUARIO
        let nome = slct_personagem.value
        let vida = hpAPersonagem

        console.log(`id = ${id}, nome = ${nome}, vida = ${vida}`)

        fetch("/personagem/atualizarVida", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                idServer: id,
                nomeServer: nome,
                hpServer: vida
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    console.log('Vida atualizada!')
                } else {
                    throw "Houve um erro ao tentar atualizar!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }

    function atualizarPersonagens() {
        let personagemAtual = slct_personagem.value
        const idServer = sessionStorage.ID_USUARIO
        fetch("/personagem/atualizar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                idServer: idServer
            })
        }).then(function (resposta) {
            console.log("Atualizando personagens!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    sessionStorage.PERSONAGENS = JSON.stringify(json.personagens)
                });

            }

        })

        exibirPersonagensPorPlayer(personagemAtual)
    }

    function roll(bonus) {
        let dado = (Math.random() * (20 - 1) + 1).toFixed(0)
        let dado_final = Number(dado) + Number(bonus)

        fetch("/resultado/adicionarDado", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                idServer: sessionStorage.ID_USUARIO,
                nomeServer: slct_personagem.value,
                dadoServer: dado_final
            }),
        }).then(function (resposta) {
            if (resposta.ok) {
                console.log("Dado adicionado no banco!")
                console.log(resposta);
            }else{
                console.log('Erro')
            }

        })
        dialogo_resultado.open = true
        div_dado.innerHTML = dado_final
        div_bonus.innerHTML = `d20 + ${Number(bonus)}`
        return dado
    }

    function fechar(){
        dialogo_resultado.open = false
    }
</script>
