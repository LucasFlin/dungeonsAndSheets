<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personagens</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./logo/DNS_Logo-com fundo.ico">
</head>
<body>
    <div class="pagina">
        <div class="cabecalho">
            <img src="./logo/DNS_Logo-full-branco.png" class="icone">
            <div>
                <a href="./personagens.html" class="atual">Personagens</a> | <a href="./dashboard.html">Estatísticas</a>
                | <a href="./index.html">Sair</a>
            </div>
        </div>
    </div>

    <div class="pers-geral">
        <div>
            <!-- Personagem e vida -->

            <dialog popover="auto" id="criar_ficha" class="ficha">
                <div class="ficha-input">
                    <span>Nome:</span>
                    <input type="text" id="ipt_nome">
                </div>
                <div class="ficha-campos">
                    <div class="ficha-input">
                        <span>Raça:</span>
                        <input type="text" id="ipt_raca">
                    </div>
                    <div class="ficha-input">
                        <span>Classe:</span>
                        <input type="text" id="ipt_classe">
                    </div>
                </div>
                <div>
                    <div>
                        <input type="number" id="ipt_for">
                        <input type="number" id="ipt_dex">
                        <input type="number" id="ipt_const">
                        <input type="number" id="ipt_int">
                        <input type="number" id="ipt_sab">
                        <input type="number" id="ipt_car">
                    </div>
                    <div>
                        <div><input type="checkbox" id="chk_acrobacia"><label for="chk_acrobacia">Acrobacia <span>(Des)</span></label></div>
                        <div><input type="checkbox" id="chk_arcanismo"><label for="chk_arcanismo">Arcanismo <span>(Int)</span></label></div>
                        <div><input type="checkbox" id="chk_atletismo"><label for="chk_atletismo">Atletismo <span>(For)</span></label></div>
                        <div><input type="checkbox" id="chk_atuacao"><label for="chk_atuacao">Atuação <span>(Car)</span></label></div>
                        <div><input type="checkbox" id="chk_enganacao"><label for="chk_enganacao">Enganação <span>(Car)</span></label></div>
                        <div><input type="checkbox" id="chk_furtividade"><label for="chk_furtividade">Furtividade <span>(Des)</span></label></div>
                        <div><input type="checkbox" id="chk_historia"><label for="chk_historia">Historia <span>(Int)</span></label></div>
                        <div><input type="checkbox" id="chk_intimidacao"><label for="chk_intimidacao">Intimidação <span>(Car)</span></label></div>
                        <div><input type="checkbox" id="chk_intuicao"><label for="chk_intuicao">Intuição <span>(Sab)</span></label></div>
                        <div><input type="checkbox" id="chk_investigacao"><label for="chk_investigacao">Investigação <span>(Int)</span></label></div>
                        <div><input type="checkbox" id="chk_lidar"><label for="chk_lidar">Lidar com Animais <span>(Sab)</span></label></div>
                        <div><input type="checkbox" id="chk_medicina"><label for="chk_medicina">Medicina <span>(Sab)</span></label></div>
                        <div><input type="checkbox" id="chk_natureza"><label for="chk_natureza">Natureza <span>(Int)</span></label></div>
                        <div><input type="checkbox" id="chk_percepcao"><label for="chk_percepcao">Percepção <span>(Sab)</span></label></div>
                        <div><input type="checkbox" id="chk_persuasao"><label for="chk_persuasao">Persuasão <span>(Car)</span></label></div>
                        <div><input type="checkbox" id="chk_prestidigitacao"><label for="chk_prestidigitacao">Prestidigitação <span>(Des)</span></label></div>
                        <div><input type="checkbox" id="chk_religiao"><label for="chk_religiao">Religião <span>(Int)</span></label></div>
                        <div><input type="checkbox" id="chk_sobrevivencia"><label for="chk_sobrevivencia">Sobrevivência <span>(Sab)</span></label></div>
                    </div>
                    <button onclick="add()">Criar Personagem</button>
                </div>
            </dialog>

            <select id="slct_personagem" oninput="trocaPersonagem()">
                <option value=""></option>
                <option value="novo">Novo personagem...</option>
            </select>
        </div>
        <div>
            <!-- Dados -->
        </div>
        <div>
            <!-- Habilidades e Inventários -->
        </div>
    </div>
</body>
</html>
<script>
    function trocaPersonagem(){
        let valor = slct_personagem.value

        if(valor == 'novo'){
            criar_ficha.open = true
        }
    }
    function add(){
        let nome = ipt_nome.value

        slct_personagem.innerHTML += `<option id='0'>${nome}</option>`
        criar_ficha.open = false
    }
</script>
