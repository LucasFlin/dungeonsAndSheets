<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personagens</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./logo/DNS_Logo-com fundo.ico">
    <script src="..\src\controllers\personagemController.js"></script>
</head>

<body>
    <div class="pagina">
        <div class="cabecalho">
            <img src="./logo/DNS_Logo-full-branco.png" class="icone">
            <div>
                <a href="./personagens.html" class="atual">Personagens</a> | <a href="./dashboard.html">Estatísticas</a>
                | <a href="./index.html">Sair</a>
            </div>
        </div>
    </div>

    <div class="pers-geral">
        <div>
            <!-- Personagem e vida -->

            <dialog popover="auto" id="criar_ficha" class="ficha">
                <div class="ficha-input">
                    <span>Nome:</span>
                    <input type="text" id="ipt_nome">
                </div>
                <div class="ficha-campos">
                    <div class="ficha-input">
                        <span>Raça:</span>
                        <input type="text" id="ipt_raca">
                    </div>
                    <div class="ficha-input">
                        <span>Classe:</span>
                        <input type="text" id="ipt_classe">
                    </div>
                </div>
                <div>
                    <div class="ficha-stats">
                        <div>
                            <input type="number" id="ipt_for">
                            <div id="div_for">0</div>
                        </div>
                        <div>
                            <input type="number" id="ipt_dex">
                            <div id="div_dex">0</div>
                        </div>
                        <div>
                            <input type="number" id="ipt_const">
                            <div id="div_const">0</div>
                        </div>
                        <div>
                            <input type="number" id="ipt_int">
                            <div id="div_int">0</div>
                        </div>
                        <div>
                            <input type="number" id="ipt_sab">
                            <div id="div_sab">0</div>
                        </div>
                        <div>
                            <input type="number" id="ipt_car">
                            <div id="div_car">0</div>
                        </div>
                    </div>
                    <div>
                        <div><input type="checkbox" id="chk_acrobacia"><label for="chk_acrobacia">Acrobacia
                                <span>(Des)</span></label></div>
                        <div><input type="checkbox" id="chk_arcanismo"><label for="chk_arcanismo">Arcanismo
                                <span>(Int)</span></label></div>
                        <div><input type="checkbox" id="chk_atletismo"><label for="chk_atletismo">Atletismo
                                <span>(For)</span></label></div>
                        <div><input type="checkbox" id="chk_atuacao"><label for="chk_atuacao">Atuação
                                <span>(Car)</span></label></div>
                        <div><input type="checkbox" id="chk_enganacao"><label for="chk_enganacao">Enganação
                                <span>(Car)</span></label></div>
                        <div><input type="checkbox" id="chk_furtividade"><label for="chk_furtividade">Furtividade
                                <span>(Des)</span></label></div>
                        <div><input type="checkbox" id="chk_historia"><label for="chk_historia">Historia
                                <span>(Int)</span></label></div>
                        <div><input type="checkbox" id="chk_intimidacao"><label for="chk_intimidacao">Intimidação
                                <span>(Car)</span></label></div>
                        <div><input type="checkbox" id="chk_intuicao"><label for="chk_intuicao">Intuição
                                <span>(Sab)</span></label></div>
                        <div><input type="checkbox" id="chk_investigacao"><label for="chk_investigacao">Investigação
                                <span>(Int)</span></label></div>
                        <div><input type="checkbox" id="chk_lidar"><label for="chk_lidar">Lidar com Animais
                                <span>(Sab)</span></label></div>
                        <div><input type="checkbox" id="chk_medicina"><label for="chk_medicina">Medicina
                                <span>(Sab)</span></label></div>
                        <div><input type="checkbox" id="chk_natureza"><label for="chk_natureza">Natureza
                                <span>(Int)</span></label></div>
                        <div><input type="checkbox" id="chk_percepcao"><label for="chk_percepcao">Percepção
                                <span>(Sab)</span></label></div>
                        <div><input type="checkbox" id="chk_persuasao"><label for="chk_persuasao">Persuasão
                                <span>(Car)</span></label></div>
                        <div><input type="checkbox" id="chk_prestidigitacao"><label
                                for="chk_prestidigitacao">Prestidigitação <span>(Des)</span></label></div>
                        <div><input type="checkbox" id="chk_religiao"><label for="chk_religiao">Religião
                                <span>(Int)</span></label></div>
                        <div><input type="checkbox" id="chk_sobrevivencia"><label for="chk_sobrevivencia">Sobrevivência
                                <span>(Sab)</span></label></div>
                    </div>
                    <button onclick="add()">Criar Personagem</button>
                </div>
            </dialog>
            <div class="linha">
                <select id="slct_personagem" oninput="trocaPersonagem()" class="select_personagem">
                    <option value=""></option>
                    <option value="novo">Novo personagem...</option>
                </select>
                <div class="hp">
                    <p id="numero_hp">12/12</p>
                    <div class="graf_vida">
                        <button>+</button> <canvas id="barra_vida"></canvas> <button>-</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="atributos">
            <button id="btn_forca" class="dado">-1</button>
            <button id="btn_des" class="dado">0</button>
            <button id="btn_cons" class="dado">+1</button>
            <button id="btn_int" class="dado">+1</button>
            <button id="btn_sab" class="dado">+2</button>
            <button id="btn_car" class="dado">+2</button>
        </div>
        <div>

        </div>
    </div>
</body>

</html>
<script>

    window.onload = buscarPersonagensPorPlayer()

    function buscarPersonagensPorPlayer() {
        var personagens = JSON.parse(sessionStorage.PERSONAGENS);
        personagens.forEach(item => {
            document.getElementById("slct_personagem").innerHTML += `<option id='${item.id_personagem}'>${item.nome}</option>`
            obterDadosGrafico(item.id)
        });

        if (personagens.length > 0) {
            exibirAquario(personagens[0].id)
        }
    }

    function trocaPersonagem() {
        let valor = slct_personagem.value

        if (valor == 'novo') {
            criar_ficha.open = true
        }
    }
    function add() {
        let nome = ipt_nome.value

        slct_personagem.innerHTML += `<option id='0'>${nome}</option>`
        criar_ficha.open = false
    }
</script>
