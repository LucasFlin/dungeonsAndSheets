<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./logo/DNS_Logo-com fundo.ico">
    <script src="./script.js"></script>
</head>
<body>
    <div class="pagina">
        <div class="cabecalho">
            <a href="./index.html"><img src="./logo/DNS_Logo-full-branco.png" class="icone"></a>
            <div>
                <a href="./login.html" class="atual">Login</a> | <a href="./cadastro.html">Cadastro</a>
            </div>
        </div>
        <div class="fundo-login-cadastro">
            <div class="pergaminho-login">
                <span class="texto">Email:</span>
                <input type="text" id="ipt_email" class="escrita">
                <div id="div_email"></div>
                <span class="texto">Senha:</span>
                <input type="password" id="ipt_senha" class="escrita">
                <div id="div_senha"></div>
                <button class="botao" onclick="entrar()">Entrar na Guilda</button>
            </div>
        </div>
    </div>
</body>
</html>
<script>
    function entrar() {

        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;

        if (emailVar == "" || senhaVar == "") {
            alert(`Você entrega seu pergaminho para a atendente no balcão.

Após olhar a folha ela te entrega novamente dizendo:
"Por favor, preencha todos os campos antes de prosseguir, não posso lhe dar acesso ao resto da Guilda sem eles..."`);
            return false;
        }   

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    setTimeout(function () {
                        window.location = "./personagens.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
</script>
